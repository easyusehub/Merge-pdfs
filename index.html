<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Merge PDFs – EasyUseHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f0f0f;color:#fff;text-align:center; position: relative; overflow-x: hidden;}
.container{max-width:900px;margin:auto;padding:25px;}
.logo img{max-width:220px;margin:10px auto 20px;display:block;}

/* Push Ad Style */
#push-notification {
    position: fixed;
    bottom: -150px; right: 20px; width: 300px; background: #fff; border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center;
    padding: 12px; z-index: 10000; transition: bottom 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    cursor: pointer; border-left: 5px solid #2563eb; color: #333;
}
#push-notification.active { bottom: 20px; }
#push-notification img { width: 50px; height: 50px; border-radius: 8px; margin-right: 12px; }
.push-text { text-align: left; flex: 1; }
.push-text b { font-size: 14px; color: #222; display: block; }
.push-text p { font-size: 12px; color: #666; margin: 3px 0 0 0; }
.close-push { position: absolute; top: 5px; right: 8px; font-size: 18px; color: #aaa; cursor: pointer; }

/* Ad Bridge Style */
.custom-ad-bridge {
    background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; padding: 25px;
    margin: 20px 0; border-radius: 12px; cursor: pointer; text-align: center;
}
.ad-title { font-size: 20px; font-weight: bold; display: block; }
.ad-btn { background: #fbbf24; color: #000; padding: 8px 20px; border-radius: 5px; font-weight: bold; margin-top: 10px; display: inline-block; }

.tool-box{border:2px solid #444; background: #1a1a1a; padding:30px; margin:30px 0; border-radius: 12px;}
input[type=file]{margin-top:15px; background: #fff; color: #000; padding: 10px; border-radius: 5px;}
button{margin-top:20px;padding:15px 30px;font-size:18px;font-weight:bold;background:#16a34a;color:#fff;border:none;cursor:pointer; border-radius: 8px;}
.message{margin-top:20px;font-weight:bold; font-size: 18px;}
.home-btn{display:inline-block;margin:15px;padding:12px 26px;background:#444;color:#fff;text-decoration:none;border-radius: 8px;}
</style>
</head>
<body>

<div id="push-notification" onclick="window.open('https://easyusehub.blogspot.com', '_blank')">
    <span class="close-push" onclick="event.stopPropagation(); document.getElementById('push-notification').classList.remove('active');">&times;</span>
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968313.png" alt="icon">
    <div class="push-text">
        <b>🚀 46+ Premium Free Tools Ready!</b>
        <p>PDF Tools, Calculators & more - 100% Free at EasyUseHub.</p>
    </div>
</div>

<div class="container">
  <div class="logo">
    <img src="https://i.ibb.co.com/WWBzC3V1/file-00000000d63871fdba8af288585dcadb.png" alt="EasyUseHub Logo">
  </div>

  <div class="custom-ad-bridge" onclick="window.open('https://easyusehub.blogspot.com', '_blank')">
      <span class="ad-title">🚀 Try 46+ Premium Free Web Tools!</span>
      <div class="ad-btn">Open EasyUseHub</div>
  </div>

  <h1>Merge PDFs</h1>
  <p>Combine multiple PDF files (Max 20 MB each) instantly.</p>

  <div class="tool-box">
    <input type="file" id="pdfs" accept="application/pdf" multiple>
    <br>
    <button id="mergeBtn" onclick="mergePDFs()">Merge Files Now</button>
    <div id="msg" class="message"></div>
  </div>

  <div class="custom-ad-bridge" style="background: linear-gradient(135deg, #059669, #10b981);" onclick="window.open('https://easyusehub.blogspot.com/p/image-compressor.html', '_blank')">
      <span class="ad-title">⚡ High-Speed Image Compressor</span>
      <div class="ad-btn" style="background: #fff; color: #059669;">Try Now</div>
  </div>

  <a href="https://easyusehub.blogspot.com/p/free-pdf-tools-online.html" class="home-btn">📚 All PDF Tools</a>
  <a href="https://easyusehub.blogspot.com/" class="home-btn">🏠 Home</a>
</div>

<script>
async function mergePDFs(){
  const files = document.getElementById('pdfs').files;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('mergeBtn');
  
  if(!files.length){ msg.innerText="Please select PDFs."; msg.style.color="#f87171"; return; }

  btn.disabled = true;
  msg.innerText="🔄 Merging... This may take a moment for larger files.";
  msg.style.color="#fbbf24";

  setTimeout(() => { document.getElementById('push-notification').classList.add('active'); }, 1000);

  try {
    const mergedPdf = await PDFLib.PDFDocument.create();

    for(const f of files){
      if(f.size > 20*1024*1024){ // ২০ এমবি লিমিট
        msg.innerText=`❌ ${f.name} is over 20 MB.`; 
        msg.style.color="#f87171";
        btn.disabled = false;
        return;
      }
      const bytes = await f.arrayBuffer();
      const pdf = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
      const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
      copiedPages.forEach(p => mergedPdf.addPage(p));
    }

    // মেমোরি বাঁচাতে সেভ করার সময় অপ্টিমাইজেশন
    const mergedBytes = await mergedPdf.save();
    const blob = new Blob([mergedBytes], {type:"application/pdf"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Merged-EasyUseHub.pdf";
    link.click();

    msg.innerText="✅ Successfully merged!";
    msg.style.color="#4ade80";
  } catch (err) {
    msg.innerText="❌ Processing failed. Try smaller files.";
    msg.style.color="#f87171";
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
